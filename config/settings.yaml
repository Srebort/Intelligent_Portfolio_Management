# =============================================================
# CONFIGURACIÓN TEMPORAL
# =============================================================
start_date: '2018-01-01'
end_date: '2026-05-01'
initial_capital: 100000.0

# Temporalidades disponibles para análisis multi-timeframe
# La estrategia principal usa timeframe_primary; los demás son contexto
timeframes:
  - '1Hour'   # 1 hora  — señales de entrada de precisión
  - '4Hour'   # 4 horas — temporalidad principal de la estrategia
  - '1Day'    # Diario  — tendencia de medio plazo
  - '1Week'   # Semanal — tendencia de largo plazo / contexto macro

timeframe_primary: '4Hour'  # Temporalidad principal para el backtest

# =============================================================
# FUENTES DE DATOS
# =============================================================
data_sources:
  tiingo:
    api_url: "https://api.tiingo.com/iex"
  fred:
    api_url: "https://api.stlouisfed.org/fred/series/observations"
    series:
      - 'FEDFUNDS'   # Tipo de interés de la Fed
      - 'CPIAUCSL'   # IPC (Inflación)
      - 'UNRATE'     # Tasa de desempleo
      - 'T10Y2Y'     # Spread bono 10Y-2Y (indicador recesión)
      - 'VIXCLS'     # VIX (Índice de volatilidad / Miedo)
